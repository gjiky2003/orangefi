# ═══════════════════════════════════════════════════════════════════════════════
# OrangeFi Development Infrastructure — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   docker compose up -d            # Start all services
#   docker compose up -d postgres redis minio   # Start only infrastructure
#   docker compose logs -f backend  # Tail backend logs
#   docker compose down -v          # Stop and remove volumes (WIPES DATA)
#
# Environment variables are loaded from:
#   1. Shell environment (highest priority)
#   2. .env file in the project root
#   3. Defaults specified below
#
# ═══════════════════════════════════════════════════════════════════════════════

name: orangefi

services:
  # ── PostgreSQL 16 (Primary Database) ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orangefi-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orangefi
      POSTGRES_USER: orangefi
      POSTGRES_PASSWORD: orangefi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orangefi -d orangefi"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - orangefi-net

  # ── Redis 7 (Cache, Rate Limiting, Celery Broker) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orangefi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - orangefi-net

  # ── MinIO (S3-Compatible Object Storage for Documents) ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: orangefi-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: orangefi
      MINIO_ROOT_PASSWORD: orangefi123
      MINIO_DOMAIN: localhost
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - orangefi-net

  # ── MinIO Bucket Initializer ────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: orangefi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 orangefi orangefi123 &&
      mc mb local/orangefi-documents --ignore-existing &&
      mc mb local/orangefi-public --ignore-existing &&
      mc policy set download local/orangefi-public &&
      echo 'MinIO buckets created successfully' || echo 'Buckets may already exist'
      "
    networks:
      - orangefi-net
    restart: no

  # ── Backend (FastAPI + Uvicorn) ─────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: orangefi-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ── App ──
      APP_NAME: OrangeFi
      ENVIRONMENT: development
      DEBUG: "true"
      SECRET_KEY: \${SECRET_KEY:-dev-secret-not-for-production}
      CORS_ORIGINS: "\${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}"

      # ── Database ──
      DATABASE_URL: "postgresql+asyncpg://orangefi:orangefi@postgres:5432/orangefi"
      DATABASE_URL_SYNC: "postgresql+psycopg2://orangefi:orangefi@postgres:5432/orangefi"
      DB_ECHO: "false"

      # ── Redis ──
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"

      # ── S3 / MinIO ──
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: orangefi
      S3_SECRET_KEY: orangefi123
      S3_BUCKET: orangefi-documents
      S3_REGION: us-east-1

      # ── Default Admin ──
      ADMIN_EMAIL: admin@orangefi.com
      ADMIN_PASSWORD: \${ADMIN_PASSWORD:-}

      # ── Encryption ──
      ENCRYPTION_KEY: "\${ENCRYPTION_KEY:-}"

      # ── Rate Limiting ──
      RATE_LIMIT_PER_MINUTE: "120"
      RATE_LIMIT_AUTH_PER_MINUTE: "10"

      # ── External Services (stubbed for dev) ──
      PLAID_ENV: sandbox
      STRIPE_SECRET_KEY: ""
      SENDGRID_API_KEY: ""
      TWILIO_ACCOUNT_SID: ""

    volumes:
      - ../backend/app:/app/app    # Hot-reload for app code
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - orangefi-net

  # ── Frontend (Next.js 14) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: orangefi-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
      NEXT_PUBLIC_APP_NAME: "OrangeFi"
      NEXT_PUBLIC_ENVIRONMENT: development
    depends_on:
      - backend
    networks:
      - orangefi-net

# ═══════════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  postgres_data:
    driver: local
    name: orangefi_postgres_data
  minio_data:
    driver: local
    name: orangefi_minio_data

# ═══════════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  orangefi-net:
    driver: bridge
    name: orangefi-net
